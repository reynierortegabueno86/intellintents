name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ─────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --junitxml=junit-results.xml \
            -x

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/junit-results.xml

  # ─── Backend lint ──────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --select E,F,W --ignore E501,E402

  # ─── Frontend build ────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── Integration check ────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        run: pip install -r backend/requirements.txt httpx

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Verify app starts
        run: |
          cd backend
          timeout 15 python -c "
          import asyncio
          from contextlib import asynccontextmanager
          from app.main import app
          from httpx import AsyncClient, ASGITransport

          async def check():
              # Trigger lifespan to create DB tables
              async with asynccontextmanager(app.router.lifespan_context)(app):
                  transport = ASGITransport(app=app)
                  async with AsyncClient(transport=transport, base_url='http://test') as client:
                      # API root
                      r = await client.get('/')
                      assert r.status_code == 200, f'API root failed: {r.status_code}'
                      # API datasets endpoint
                      r = await client.get('/api/datasets')
                      assert r.status_code == 200, f'Datasets failed: {r.status_code}'
                      # SPA index.html
                      r = await client.get('/some-frontend-route')
                      assert r.status_code == 200, f'SPA failed: {r.status_code}'
                      assert 'html' in r.headers.get('content-type', '').lower()
                      print('All integration checks passed')

          asyncio.run(check())
          " || exit 1
